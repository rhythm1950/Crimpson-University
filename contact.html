<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crimpson University</title>
    <!-- stylesheet -->
    <link rel="stylesheet" href="style.css" />
    <!-- fontawesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.4/css/fontawesome.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- hero-section starts -->
    <section class="sub-header">
      <nav>
        <a href="index.html"><img src="images/logo.png" alt="logo" /></a>
        <div class="nav-links" id="navLinks">
          <i class="fa far fa-window-close" onclick="hideMenu()"></i>
          <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="about.html">ABOUT</a></li>
            <li><a href="courses.html">COURSE</a></li>
            <li><a href="blogs.html">BLOG</a></li>
            <li><a href="contact.html">CONTACT</a></li>
          </ul>
        </div>
        <i class="fa fas fa-bars" onclick="showMenu()"></i>
      </nav>
      <h1>Contact Us</h1>
    </section>

    <!-- contact us content -->
    <section class="location">
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d23787.307363038846!2d-87.71656477049302!3d41.819395103466036!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x880e3200509af80d%3A0x69b45c6bfeed5416!2sBrighton%20Park%2C%20Chicago%2C%20IL%2C%20USA!5e0!3m2!1sen!2sbd!4v1650437412669!5m2!1sen!2sbd"
        width="600"
        height="450"
        style="border: 0"
        allowfullscreen=""
        loading="lazy"
      ></iframe>
    </section>

    <section class="contact-us">
      <div class="row">
        <div class="contact-col">
          <div>
            <i class="fa fa-home"></i>
            <span>
              <h5>Brighton Park</h5>
              <p>Chicago, IL, USA</p>
            </span>
          </div>
          <div>
            <i class="fa fa-phone"></i>
            <span>
              <h5>+1 8946 88398 22</h5>
              <p>Monday to Friday, 10AM to 8PM</p>
            </span>
          </div>
          <div>
            <i class="fa fa-envelope"></i>
            <span>
              <h5>crimpson@gmail.com</h5>
              <p>Email us your query</p>
            </span>
          </div>
        </div>

        <div class="contact-col">
          <form action="">
            <input type="text" name="name" placeholder="Your Name" required />
            <input
              type="email"
              name="email"
              placeholder="Email Address"
              required
            />
            <input
              type="text"
              name="subject"
              placeholder="Your Subject"
              required
            />
            <textarea
              rows="8"
              name="text"
              placeholder="Your Message"
              required
            ></textarea>
            <button type="submit" class="button">Send Message</button>
          </form>
        </div>
      </div>
    </section>

    <!-- footer-section starts -->
    <footer class="footer">
      <div class="social-icons">
        <i class="fas fa-facebook"></i>
        <i class="fas fa-twitter"></i>
        <i class="fas fa-instagram"></i>
      </div>
      <p>Developed By Shahriar Rhythm</p>
      <h5>Copyright_Rhythm_2021. All Rights Reserved.</h5>
    </footer>

    <!-- simple js functions -->
    <script>
      var navLinks = document.getElementById("navLinks");

      function showMenu() {
        navLinks.style.right = "0";
      }

      function hideMenu() {
        navLinks.style.right = "-200px";
      }
    </script>
  </body>
</html>
